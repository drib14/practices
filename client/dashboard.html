<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- SEO Optimization Meta Tags -->
  <title>Dashboard | FixConnect - Manage Your Bookings</title>
  <meta name="description" content="Manage your FixConnect profile, check active bookings, and schedule services from your simple, clean account panel.">
  <meta name="keywords" content="FixConnect, customer dashboard, provider profile, service booking scheduler">
  <meta name="robots" content="noindex, nofollow">
  
  <!-- Stylesheets -->
  <link rel="stylesheet" href="style.css">
  
  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <!-- Libraries: Axios, SweetAlert2 -->
  <script src="https://cdn.jsdelivr.net/npm/axios@1.6.7/dist/axios.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

  <!-- Minimalist Dashboard Layout -->
  <main class="dashboard-container" id="main-dashboard">
    
    <!-- Top Header -->
    <header class="dashboard-header">
      <div>
        <h1 class="dashboard-title-logo" id="dashboard-logo">FixConnect</h1>
        <p class="brand-subtitle">Service Booking Portal</p>
      </div>
      <div style="text-align: right;">
        <p style="font-weight: 600;" id="user-header-name">Loading...</p>
        <p style="font-size: 0.8rem; color: var(--text-secondary);" id="user-header-role">Customer</p>
      </div>
    </header>

    <!-- Content Card -->
    <section class="profile-card">
      <header>
        <h2 style="font-size: 1.25rem; font-weight: 600; margin-bottom: 24px; color: var(--text-primary);">
          Profile Information
        </h2>
      </header>

      <div class="profile-grid">
        <div class="profile-item" id="p-fullname-box">
          <div class="profile-item-label">Full Name</div>
          <div class="profile-item-value" id="profile-fullname">Loading...</div>
        </div>
        <div class="profile-item" id="p-username-box">
          <div class="profile-item-label">Username</div>
          <div class="profile-item-value" id="profile-username">Loading...</div>
        </div>
        <div class="profile-item" id="p-email-box">
          <div class="profile-item-label">Email Address</div>
          <div class="profile-item-value" id="profile-email">Loading...</div>
        </div>
        <div class="profile-item" id="p-role-box">
          <div class="profile-item-label">Account Role</div>
          <div class="profile-item-value" id="profile-role">Loading...</div>
        </div>
      </div>

      <!-- Action Area -->
      <footer class="btn-group">
        <button id="logout-btn" class="btn-premium">
          <i class="fa-solid fa-right-from-bracket"></i> Sign Out (Current Device)
        </button>
        <button id="logout-all-btn" class="btn-premium btn-secondary">
          <i class="fa-solid fa-desktop"></i> Sign Out (All Devices)
        </button>
      </footer>
    </section>

  </main>

  <script src="js/main.js"></script>
</body>
</html>
