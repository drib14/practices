<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- SEO Optimization Meta Tags -->
  <title>Login | FixConnect - Premium Service Booking Platform</title>
  <meta name="description" content="Securely log in to FixConnect to access professional services or manage your client bookings. Your trusted home and local service booking platform.">
  <meta name="keywords" content="FixConnect, service booking, login, local services, handyman, contractor booking">
  <meta name="robots" content="index, follow">
  
  <!-- Stylesheets -->
  <link rel="stylesheet" href="style.css">
  
  <!-- FontAwesome & Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <!-- Libraries: Axios, SweetAlert2 -->
  <script src="https://cdn.jsdelivr.net/npm/axios@1.6.7/dist/axios.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

  <!-- Card container with unique ID for identification -->
  <main class="glass-card" id="auth-card">
    
    <!-- State 1: User Login Form -->
    <section id="login-section">
      <header class="brand-header">
        <h1 class="brand-logo" id="main-brand-title">FixConnect</h1>
        <p class="brand-subtitle">Enter credentials to access your account</p>
      </header>

      <form id="login-form" class="auth-form" novalidate>
        <div class="form-group">
          <label for="login-username" class="form-label">Username or Email</label>
          <div class="input-wrapper">
            <i class="fa-solid fa-user input-icon"></i>
            <input type="text" id="login-username" class="form-control" placeholder="Enter username or email" required>
          </div>
        </div>

        <div class="form-group">
          <label for="login-password" class="form-label">Password</label>
          <div class="input-wrapper">
            <i class="fa-solid fa-lock input-icon"></i>
            <input type="password" id="login-password" class="form-control" placeholder="Enter password" required>
          </div>
        </div>

        <button type="submit" class="btn-premium" id="login-submit-btn">Sign In</button>
      </form>

      <footer class="auth-footer">
        <p style="margin-bottom: 8px;">
          <a href="#" id="forgot-password-link" class="auth-link">Forgot Password?</a>
        </p>
        <p>Don't have an account? <a href="register.html" class="auth-link">Register here</a></p>
      </footer>
    </section>

    <!-- State 2: Forgot Password Form -->
    <section id="forgot-section" style="display: none;">
      <header class="brand-header">
        <h2 class="brand-logo">Reset Password</h2>
        <p class="brand-subtitle">Enter email to receive password reset link</p>
      </header>

      <form id="forgot-form" class="auth-form" novalidate>
        <div class="form-group">
          <label for="forgot-email" class="form-label">Email Address</label>
          <div class="input-wrapper">
            <i class="fa-solid fa-envelope input-icon"></i>
            <input type="email" id="forgot-email" class="form-control" placeholder="yourname@example.com" required>
          </div>
        </div>

        <button type="submit" class="btn-premium">Send Reset Link</button>
        <button type="button" id="back-to-login-btn" class="btn-premium btn-secondary">Back to Login</button>
      </form>
    </section>

    <!-- State 3: Reset Password Callback Form -->
    <section id="reset-section" style="display: none;">
      <header class="brand-header">
        <h2 class="brand-logo">New Password</h2>
        <p class="brand-subtitle">Create a secure new password</p>
      </header>

      <form id="reset-form" class="auth-form" novalidate>
        <input type="hidden" id="reset-token">
        
        <div class="form-group">
          <label for="reset-password" class="form-label">New Password</label>
          <div class="input-wrapper">
            <i class="fa-solid fa-lock input-icon"></i>
            <input type="password" id="reset-password" class="form-control" placeholder="Minimum 12 characters" required>
          </div>
          
          <!-- Password strength checklist -->
          <div class="password-checklists" id="reset-pw-checklist">
            <span class="check-item invalid" id="reset-len-check"><i class="fa-solid fa-circle-xmark"></i> 12+ Chars</span>
            <span class="check-item invalid" id="reset-upper-check"><i class="fa-solid fa-circle-xmark"></i> Uppercase</span>
            <span class="check-item invalid" id="reset-lower-check"><i class="fa-solid fa-circle-xmark"></i> Lowercase</span>
            <span class="check-item invalid" id="reset-num-check"><i class="fa-solid fa-circle-xmark"></i> Number</span>
            <span class="check-item invalid" id="reset-special-check"><i class="fa-solid fa-circle-xmark"></i> Special Char</span>
          </div>
        </div>

        <button type="submit" class="btn-premium">Update Password</button>
      </form>
    </section>

  </main>

  <script src="js/main.js"></script>
</body>
</html>
